name: Build Standalone Executables

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.ico --name InventionMachineMargins-Windows InventionMachineMargins.py

    - name: Build with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.icns --name InventionMachineMargins InventionMachineMargins.py
        cd dist
        zip -r InventionMachineMargins-macOS.zip InventionMachineMargins.app

    - name: Build with PyInstaller (Linux)
      if: runner.os == 'Linux'
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=app_icon.png --name InventionMachineMargins-Linux InventionMachineMargins.py

    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: binary-windows
        path: dist/InventionMachineMargins-Windows.exe

    - name: Upload Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: binary-macos
        path: dist/InventionMachineMargins-macOS.zip

    - name: Upload Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: binary-linux
        path: dist/InventionMachineMargins-Linux

  release:
    name: Publish to GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Automated Build"
          body: "This is an automatically generated release containing the latest compiled versions for Windows, macOS, and Linux."
          artifacts: "release_assets/*"
          allowUpdates: true
          replacesArtifacts: true
          commit: ${{ github.sha }}
